<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Destruir Artefacto</title>
    <style>
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; padding: 40px; display: flex; justify-content: center; text-transform: uppercase;}
        .form-container { background-color: #18181b; padding: 40px; width: 450px; text-align: center; border-top: 4px solid #ef4444; border-radius: 4px;}
        h2 { font-weight: 900; font-size: 2.5rem; margin-top: 0; margin-bottom: 15px; letter-spacing: 1px; color: #ef4444;}
        p { color: #a1a1aa; margin-bottom: 30px; font-size: 1rem; text-transform: none; line-height: 1.5;}
        .actions-container { display: flex; gap: 15px; justify-content: center;}
        .btn-submit { background-color: #ef4444; color: #ffffff; border: none; padding: 15px 35px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; border-radius: 4px;}
        .btn-submit:hover { background-color: #dc2626; }
        .cancel-link { background-color: transparent; border: 1px solid #27272a; color: #e4e4e7; text-decoration: none; padding: 14px 35px; font-weight: bold; font-size: 1rem; transition: 0.3s; border-radius: 4px;}
        .cancel-link:hover { background-color: #27272a; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>ELIMINAR PRODUCTO</h2>
        <p>Estás a punto de eliminar <strong>{{ product.name }}</strong> del inventario de forma permanente. Esta acción no se puede deshacer.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="actions-container">
                <button type="submit" class="btn-submit">ELIMINAR</button>
                <a href="{% url 'product_list' %}" class="cancel-link">CANCELAR</a>
            </div>
        </form>
    </div>
</body>
</html>
